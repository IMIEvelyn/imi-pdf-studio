<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IMI. 華語PDF教材坊</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
      }
    }
  </script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#FFF6E9]">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Wand2, BookOpen, MessageCircle, FileWarning, Settings, 
      Download, Plus, Trash2, Edit3, ChevronRight, CheckCircle2,
      Coffee, AlertCircle, Type, X, Upload, FileImage, FileText, File, Save, Image as ImageIcon, Sparkles, Zap
    } from 'lucide-react';

    const EditPhoneticContext = React.createContext(null);

    const filterPhoneticTokens = (str) => {
      if (!str) return [];
      const cleanedStr = str.replace(/[，。！？；：「」『』、\(\)（）"'.,~—《》〈〉…?!:;\-]/g, ' ');
      return cleanedStr.trim().split(/(?:\s+|　+)/).filter(Boolean);
    };

    const fetchWithBackoff = async (url, options, retries = 5, delay = 1000) => {
      try {
        const res = await fetch(url, options);
        if (!res.ok) {
          let errorMessage = `HTTP 錯誤狀態碼: ${res.status}`;
          try {
             const errorData = await res.json();
             if (errorData.error && errorData.error.message) {
                 errorMessage = errorData.error.message;
             }
          } catch(e) {}
          
          if (res.status === 400 || res.status === 401 || res.status === 403 || res.status === 404 || res.status === 429) {
            return { isError: true, type: 'Auth', status: res.status, message: `連線限制或金鑰錯誤 (${res.status}): ${errorMessage}` };
          }
          throw new Error(errorMessage);
        }
        return await res.json();
      } catch (err) {
        if (err.isError) return err; 
        if (retries <= 0) throw err;
        await new Promise(r => setTimeout(r, delay));
        return fetchWithBackoff(url, options, retries - 1, delay * 2);
      }
    };

    const DEFAULT_SETTINGS = {
      themeTitle: '',
      className: '',
      teacherName: 'Evelyn',
      date: new Date().toISOString().split('T')[0],
      textLevel: 'TBCL 2', 
      logoUrl: null,
      phoneticType: 'zhuyin_pinyin',
      phoneticScope: 'core_only',
      translationLanguage: '韓文 (한국어)', 
      translateTargets: {
        coreText: true,
        vocab: true,
        dialogue: false,
       grammar: true,
        coreGrammar: true 
      },
      explanationMode: 'dual'
    };

    function App() {
      const [currentStep, setCurrentStep] = useState(1);
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [isGeneratingPreview, setIsGeneratingPreview] = useState(false);
      const [error, setError] = useState(null);
      const [customApiKey, setCustomApiKey] = useState('');
      
      const [rawInput, setRawInput] = useState('');
      const [selectedFiles, setSelectedFiles] = useState([]);
      
      const [parsedData, setParsedData] = useState({
        textLevel: '',
        coreTextChunks: [],
        vocabList: [],
        dialogues: [],
        coreGrammar: [],
        grammarRules: []
      });
      
      const [exportSettings, setExportSettings] = useState(DEFAULT_SETTINGS);
      const [finalPreviewData, setFinalPreviewData] = useState(null);
      
// === 智慧排版控制台：大腦記憶體 ===
  const [layoutTitleSize, setLayoutTitleSize] = React.useState(32);       // 大標題字體 (預設 32px)
  const [layoutLegendSize, setLayoutLegendSize] = React.useState(14);     // 圖例圓圈與文字 (預設 14px)
  const [layoutContentSize, setLayoutContentSize] = React.useState(24);   // 中文內文字體 (預設 24px)
  const [layoutTransSize, setLayoutTransSize] = React.useState(16);       // 外文翻譯字體 (預設 16px)
  const [layoutSpacing, setLayoutSpacing] = React.useState(32);           // 區塊呼吸間距 (預設 32px)
      
      const autoLinkChunks = (chunks, vocabList, coreGrammar, grammarRules) => {
        return chunks.map(chunk => {
          const text = (chunk.text || '').replace(/ /g, '');
          const isPunc = /^[，。！？；：「」『』、\(\)（）\s"'.\n]+$/.test(text);
          if (isPunc) return { ...chunk, type: 'punctuation' };
          
          const vocabMatch = (vocabList || []).find(v => v.word === text);
          const grammarMatch = (coreGrammar || []).find(g => g.title === text);
          const ruleMatch = (grammarRules || []).find(r => r.theme === text);
          
          if (grammarMatch || ruleMatch) return { ...chunk, type: 'grammar' };
          if (vocabMatch) return { ...chunk, type: vocabMatch.type || 'vocab' };
          
          const validTypes = ['keyword', 'vocab', 'grammar'];
          return { ...chunk, type: validTypes.includes(chunk.type) ? chunk.type : 'normal' };
        });
      };

      const tryLocalParse = (text) => {
          if (!text.includes('### 1. 核心課文')) return null;

          const result = {
              textLevel: '', coreTextChunks: [], vocabList: [], dialogues: [], coreGrammar: [], grammarRules: []
          };

          const levelMatch = text.match(/TBCL\s*(.+?)\n/i) || text.match(/(TBCL.*?)\n/i);
          if (levelMatch) result.textLevel = levelMatch[1].trim();

          const extractSection = (startMarker, endMarker) => {
              const start = text.indexOf(startMarker);
              if (start === -1) return '';
              const end = endMarker ? text.indexOf(endMarker, start) : text.length;
              return text.substring(start + startMarker.length, end !== -1 ? end : text.length).trim();
          };

          const sec1 = extractSection('### 1. 核心課文', '### 2.');
          const sec2 = extractSection('### 2. 核心詞彙', '### 3.');
          const sec3 = extractSection('### 3. 情境對話', '### 4.');
          const sec4 = extractSection('### 4. 核心語法', '### 5.');
          const sec5 = extractSection('### 5. 語法診斷室', null);

          const generateStrId = (prefix, i) => `${prefix}-${Date.now()}-${i}-${Math.random().toString(36).substr(2, 5)}`;
          const generateNumId = (i) => Date.now() + Math.floor(Math.random() * 1000000) + i;

          if (sec1) {
               try {
                   const segmenter = new Intl.Segmenter('zh-TW', { granularity: 'word' });
                   const segments = Array.from(segmenter.segment(sec1));
                   result.coreTextChunks = segments.map((seg, i) => ({ id: generateStrId('chunk', i), text: seg.segment, type: 'normal' }));
               } catch (e) {
                   result.coreTextChunks = sec1.split(/(?=[，。！？；：「」『』、])/).map((t, i) => ({ id: generateStrId('chunk', i), text: t, type: 'normal' }));
               }
          }

          if (sec2) {
               const words = sec2.split(/[,、\n]/).map(w => w.trim()).filter(Boolean);
               result.vocabList = words.map((w, i) => ({ id: generateNumId(i), word: w, pos: '生詞', type: 'vocab' }));
          }

          if (sec3) {
               const blocks = sec3.split('---').map(b => b.trim()).filter(Boolean);
               result.dialogues = blocks.map((b, i) => {
                   const lines = b.split('\n').map(l => l.trim()).filter(Boolean);
                   const titleLine = lines.find(l => l.startsWith('主題：'));
                   const title = titleLine ? titleLine.replace('主題：', '').trim() : `情境對話 ${i+1}`;
                   
                   const speakerLines = lines.filter(l => /^[A-Z甲乙]：|:/.test(l) || /^.*：/.test(l)).map((l, j) => {
                       const match = l.match(/^([^:：]+)[:：]\s*(.*)$/);
                       if (match && match[1] !== '主題') {
                           return { id: generateNumId(j), speaker: match[1].trim(), text: match[2].trim() };
                       }
                       return null;
                   }).filter(Boolean);
                   
                   return { id: generateNumId(i), title, lines: speakerLines.length > 0 ? speakerLines : [{id: generateNumId(99), speaker: 'A', text: b}] };
               });
          }

          if (sec4) {
               const blocks = sec4.split('---').map(b => b.trim()).filter(Boolean);
               blocks.forEach(b => {
                   const lines = b.split('\n').map(l => l.trim()).filter(Boolean);
                   let currentGrammar = null;
                   lines.forEach(l => {
                       if (l.startsWith('語法：')) {
                           if (currentGrammar) result.coreGrammar.push(currentGrammar);
                           currentGrammar = { id: generateNumId(result.coreGrammar.length), title: l.replace('語法：', '').trim(), description: '', examples: [] };
                       } else if (l.startsWith('* 例句：') && currentGrammar) {
                           currentGrammar.examples.push(l.replace('* 例句：', '').trim());
                       } else if (l.startsWith('* 說明：') && currentGrammar) {
                           currentGrammar.description = l.replace('* 說明：', '').trim();
                       }
                   });
                   if (currentGrammar) result.coreGrammar.push(currentGrammar);
               });
          }

          if (sec5) {
               const lines = sec5.split('\n').map(l => l.trim()).filter(Boolean);
               let currentRule = null;
               lines.forEach(l => {
                   if (l.startsWith('【辨析主題】：')) {
                       if (currentRule) result.grammarRules.push(currentRule);
                       currentRule = { id: generateNumId(result.grammarRules.length), theme: l.replace('【辨析主題】：', '').trim(), mistake: '', correction: '', explanation: '' };
                   } else if (l.includes('（x）') || l.includes('(x)')) {
                       if (currentRule) currentRule.mistake = l.replace(/（x）|\(x\)/i, '').trim();
                   } else if (l.includes('（o）') || l.includes('(o)')) {
                       if (currentRule) currentRule.correction = l.replace(/（o）|\(o\)/i, '').trim();
                   } else if (l.startsWith('* 情境說明：')) {
                       if (currentRule) currentRule.explanation = l.replace('* 情境說明：', '').trim();
                   }
               });
               if (currentRule) result.grammarRules.push(currentRule);
          }
          
          return result;
      };

      const handleAnalyze = async () => {
        if (!rawInput.trim() && selectedFiles.length === 0) {
          setError("老師，請匯入或貼上專屬 GEM 生成的教材模組內容喔！");
          return;
        }
        
        setError(null);
        setIsAnalyzing(true);

        try {
          let combinedText = rawInput;
          for (const file of selectedFiles) {
            if (file.type === 'text/csv' || file.name.endsWith('.csv') || file.type === 'text/plain' || file.name.endsWith('.txt')) {
               const text = await file.text();
               combinedText += `\n\n[FILE: ${file.name}]\n${text}`;
            }
          }

         const localParsedData = tryLocalParse(combinedText);
          if (localParsedData && localParsedData.coreTextChunks.length > 0) {
              
              // === 高效雙引擎：微量 AI 詞性判定 (終極裝甲版) ===
              if (localParsedData.vocabList && localParsedData.vocabList.length > 0) {
                  const activeKey = customApiKey.trim();
                  if (activeKey) {
                      try {
                          const wordsStr = localParsedData.vocabList.map(v => v.word).join(', ');
                          const miniPrompt = `你是一位華語語言學專家。請判斷以下生詞的詞性（如：名詞、動詞、形容詞、副詞等）。請直接回傳 JSON 陣列格式（例：["名詞", "動詞"]），不要有任何其他文字。生詞：${wordsStr}`;

                          // 1. 精準對齊您的專案設定，使用 gemini-2.5-flash
                          const modelName = "gemini-2.5-flash"; 
                          const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${activeKey}`;
                          const payload = {
                              contents: [{ role: "user", parts: [{ text: miniPrompt }] }],
                              generationConfig: { responseMimeType: "application/json" }
                          };

                          // 2. 呼叫您系統內建的高級防護 fetchWithBackoff
                          const result = await fetchWithBackoff(url, { 
                              method: 'POST', 
                              headers: { 'Content-Type': 'application/json' }, 
                              body: JSON.stringify(payload) 
                          });

                          // 3. 安全解析，防當機機制
                          if (result && !result.isError && result.candidates && result.candidates[0]) {
                              const textOutput = result.candidates[0].content.parts[0].text;
                              const posArray = JSON.parse(textOutput.trim());
                              
                              localParsedData.vocabList = localParsedData.vocabList.map((v, i) => ({
                                  ...v,
                                  pos: posArray[i] || '生詞'
                              }));
                          }
                      } catch (err) {
                          console.error("微量 AI 詞性判斷發生例外錯誤:", err);
                      }
                  }
              }
              // ==========================================

              // 下方為您原有的完美資料流，100% 零干擾保留
              const linkedChunks = autoLinkChunks(localParsedData.coreTextChunks, localParsedData.vocabList, localParsedData.coreGrammar, localParsedData.grammarRules);
              setParsedData({
                  textLevel: localParsedData.textLevel || exportSettings.textLevel,
                  coreTextChunks: linkedChunks,
                  vocabList: localParsedData.vocabList,
                  dialogues: localParsedData.dialogues,
                  coreGrammar: localParsedData.coreGrammar,
                  grammarRules: localParsedData.grammarRules
              });
              if (localParsedData.textLevel) {
                  setExportSettings(prev => ({ ...prev, textLevel: localParsedData.textLevel }));
              }
              setIsAnalyzing(false);
              setCurrentStep(2);
              return;
          }
          const activeKey = customApiKey.trim();
          if (!activeKey) {
              setError("您匯入的資料格式與標準範本不同，系統嘗試呼叫 AI 分析，但您尚未輸入 API Key！");
              setIsAnalyzing(false);
              return;
          }

          const modelName = "gemini-2.5-flash"; 
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${activeKey}`;
          
          const systemInstruction = `你是一位專業的資料歸位助手。老師提供的是已經整理好的結構化教材內容，請精準地歸位。
          【任務核心】提取 textLevel, coreTextChunks(極致斷詞), vocabList, dialogues, coreGrammar, grammarRules。嚴禁改寫原始文本。`;

          const payload = {
            contents: [{ role: "user", parts: [{ text: combinedText }] }],
            systemInstruction: { parts: [{ text: systemInstruction }] },
            generationConfig: { responseMimeType: "application/json" }
          };

          const result = await fetchWithBackoff(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
          if (result && result.isError) { setError(`${result.message}`); setIsAnalyzing(false); return; }
          
          let responseText = result.candidates?.[0]?.content?.parts?.[0]?.text;
          if (!responseText) throw new Error("AI 被阻擋或未回傳有效內容。");
          
          responseText = responseText.replace(/```json\n?/gi, '').replace(/```\n?/g, '').trim();
          const jsonStart = responseText.indexOf('{');
          const jsonEnd = responseText.lastIndexOf('}');
          if (jsonStart !== -1 && jsonEnd !== -1) responseText = responseText.substring(jsonStart, jsonEnd + 1);
          
          let parsedResponse = JSON.parse(responseText);
          
          const generateStrId = (prefix, i) => `${prefix}-${Date.now()}-${i}-${Math.random().toString(36).substr(2, 5)}`;
          const generateNumId = (i) => Date.now() + Math.floor(Math.random() * 1000000) + i;

          const fixedChunks = (parsedResponse.coreTextChunks || []).map((c, i) => ({ ...c, id: generateStrId('chunk', i) }));
          const fixedVocabList = Array.isArray(parsedResponse.vocabList) ? parsedResponse.vocabList.map((v, i) => ({ ...v, id: generateNumId(i) })) : [];
          const fixedDialogues = Array.isArray(parsedResponse.dialogues) ? parsedResponse.dialogues.map((d, i) => ({ ...d, id: generateNumId(i), lines: Array.isArray(d.lines) ? d.lines.map((l, j) => ({ ...l, id: generateNumId(j) })) : [] })) : [];
          const fixedCoreGrammar = Array.isArray(parsedResponse.coreGrammar) ? parsedResponse.coreGrammar.map((g, i) => ({ ...g, id: generateNumId(i) })) : [];
          const fixedGrammarRules = Array.isArray(parsedResponse.grammarRules) ? parsedResponse.grammarRules.map((r, i) => ({ ...r, id: generateNumId(i) })) : [];

          const linkedChunks = autoLinkChunks(fixedChunks, fixedVocabList, fixedCoreGrammar, fixedGrammarRules);
          
          setParsedData({ textLevel: parsedResponse.textLevel || '', coreTextChunks: linkedChunks, vocabList: fixedVocabList, dialogues: fixedDialogues, coreGrammar: fixedCoreGrammar, grammarRules: fixedGrammarRules });
          if (parsedResponse.textLevel) setExportSettings(prev => ({ ...prev, textLevel: parsedResponse.textLevel }));
          setCurrentStep(2);
        } catch (err) { 
            console.error(err);
            setError(`處理失敗：${err.message}`); 
        } finally { 
            setIsAnalyzing(false); 
        }
      };

      const handleGeneratePreview = async () => {
        const activeKey = customApiKey.trim();
        if (!activeKey) { setError("要生成翻譯與注音，請確認您已在第一步輸入了正確的 API Key！"); return; }
        setError(null);
        setIsGeneratingPreview(true);

        const fallbackToOriginalData = () => {
          setFinalPreviewData({
            coreTextChunks: (parsedData.coreTextChunks || []).map(c => ({...c, pinyin: '', zhuyin: ''})),
            coreTextTranslation: '',
            vocabList: (parsedData.vocabList || []).map(v => ({...v, pinyin: '', zhuyin: '', translation: ''})),
            dialogues: (parsedData.dialogues || []).map(d => ({ ...d, lines: (d.lines || []).map(l => ({...l, pinyin: '', zhuyin: '', translation: ''})) })),
            coreGrammar: (parsedData.coreGrammar || []).map(g => ({ ...g, titlePinyin: '', titleZhuyin: '', descPinyin: '', descZhuyin: '', translation: '', examples: (g.examples || []).map(ex => ({ text: typeof ex === 'string' ? ex : ex.text || '', pinyin: '', zhuyin: '', translation: '' })) })),
            grammarRules: (parsedData.grammarRules || []).map(r => ({...r, mistakePinyin: '', mistakeZhuyin: '', correctionPinyin: '', correctionZhuyin: '', explanationPinyin: '', explanationZhuyin: '', translation: ''}))
          });
          setCurrentStep(4);
          setIsGeneratingPreview(false);
        };

        try {
          const modelName = "gemini-2.5-flash"; 
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${activeKey}`;
          
          const dataToTranslate = {
            coreTextChunks: (parsedData.coreTextChunks || []).map(c => ({ ...c, pinyin: c.pinyin || "", zhuyin: c.zhuyin || "" })),
            coreTextTranslation: parsedData.coreTextTranslation || "",
            vocabList: (parsedData.vocabList || []).map(v => ({ ...v, pinyin: v.pinyin || "", zhuyin: v.zhuyin || "", translation: v.translation || "", posTranslation: v.posTranslation || "" })),
            dialogues: (parsedData.dialogues || []).map(d => ({ ...d, lines: (d.lines || []).map(l => ({ ...l, pinyin: l.pinyin || "", zhuyin: l.zhuyin || "", translation: l.translation || "" })) })),
            coreGrammar: (parsedData.coreGrammar || []).map(g => ({ ...g, titlePinyin: g.titlePinyin || "", titleZhuyin: g.titleZhuyin || "", descPinyin: g.descPinyin || "", descZhuyin: g.descZhuyin || "", translation: g.translation || "", examples: (g.examples || []).map(ex => { const exObj = typeof ex === 'string' ? { text: ex } : ex; return { text: exObj.text, pinyin: exObj.pinyin || "", zhuyin: exObj.zhuyin || "", translation: exObj.translation || "" }; }) })),
            grammarRules: (parsedData.grammarRules || []).map(r => ({ ...r, mistakePinyin: r.mistakePinyin || "", mistakeZhuyin: r.mistakeZhuyin || "", correctionPinyin: r.correctionPinyin || "", correctionZhuyin: r.correctionZhuyin || "", explanationPinyin: r.explanationPinyin || "", explanationZhuyin: r.explanationZhuyin || "", translation: r.translation || "" }))
          };

          const systemInstruction = `你是一位專業華語出版助手。請負責將以下 JSON 結構中的內容補齊標音與翻譯。
          【極度重要任務：強制補齊，禁止留空！】
          1. pinyin 與 zhuyin：只要有中文的地方，包含 coreTextChunks, vocabList, dialogues, coreGrammar, grammarRules，請務必將對應的 pinyin 與 zhuyin 欄位填滿！
          ★ 致命警告：所有 Pinyin 與 Zhuyin 必須「每一個漢字空一格」斷開！略過 <u> 等 HTML 標籤。
          2. translation (翻譯)：請依照設定的語言 ${exportSettings.translationLanguage}，為各模組填寫精確翻譯！`;

          const payload = {
            contents: [{ role: "user", parts: [{ text: JSON.stringify(dataToTranslate) }] }],
            systemInstruction: { parts: [{ text: systemInstruction }] },
            generationConfig: { responseMimeType: "application/json" }
          };

          const result = await fetchWithBackoff(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
          
          if (result && result.isError) { 
            setError(result.message); setIsGeneratingPreview(false); return; 
          }
          
          let responseText = result.candidates?.[0]?.content?.parts?.[0]?.text;
          if (!responseText) { fallbackToOriginalData(); return; }

          responseText = responseText.replace(/```json\n?/gi, '').replace(/```\n?/g, '').trim();
          const pJsonStart = responseText.indexOf('{');
          const pJsonEnd = responseText.lastIndexOf('}');
          if (pJsonStart !== -1 && pJsonEnd !== -1) responseText = responseText.substring(pJsonStart, pJsonEnd + 1);

          let responseData = {};
          try {
            responseData = JSON.parse(responseText);
          } catch (parseError) {
            try {
                let fixedText = responseText;
                const lastBracket = Math.max(fixedText.lastIndexOf('}'), fixedText.lastIndexOf(']'));
                if(lastBracket !== -1) fixedText = fixedText.substring(0, lastBracket + 1);
                responseData = JSON.parse(fixedText);
            } catch (e) { fallbackToOriginalData(); return; }
          }

          const mergedData = {
            coreTextChunks: (parsedData.coreTextChunks || []).map((c, i) => {
              const aiC = (responseData.coreTextChunks || []).find(ac => ac.id === c.id) || (responseData.coreTextChunks || [])[i] || {};
              return { ...c, pinyin: aiC.pinyin || c.pinyin || '', zhuyin: aiC.zhuyin || c.zhuyin || '' };
            }),
            coreTextTranslation: responseData.coreTextTranslation || '',
            vocabList: (parsedData.vocabList || []).map((v, i) => {
              const aiV = (responseData.vocabList || []).find(av => av.id === v.id) || (responseData.vocabList || [])[i] || {};
              return { ...v, pinyin: aiV.pinyin || v.pinyin || '', zhuyin: aiV.zhuyin || v.zhuyin || '', translation: aiV.translation || v.translation || '', posTranslation: aiV.posTranslation || v.posTranslation || '' };
            }),

              return {

                  return { ...l, pinyin: aiL.pinyin || l.pinyin || '', zhuyin: aiL.zhuyin || l.zhuyin || '', translation: aiL.translation || l.translation || '' };

              return {

                translation: aiG.translation || g.translation || '',
                examples: (g.examples || []).map((ex, j) => {
                  const exText = typeof ex === 'string' ? ex : ex.text;
                  const aiEx = (aiG.examples || [])[j] || {};
                  return { text: exText, pinyin: aiEx.pinyin || (ex.pinyin||''), zhuyin: aiEx.zhuyin || (ex.zhuyin||''), translation: aiEx.translation || (ex.translation||'') };

              };

    function CoreTextEditor({ data, setData, autoLink }) {
      const [isEditingRaw, setIsEditingRaw] = useState(false);
      const [rawText, setRawText] = useState('');
      const [editingChunk, setEditingChunk] = useState(null); 
      const [isSplitting, setIsSplitting] = useState(false);
      const [splitText, setSplitText] = useState('');
      useEffect(() => { if (isEditingRaw) setRawText((data.coreTextChunks || []).map(c => c.text || '').join('')); }, [isEditingRaw, data.coreTextChunks]);
      
      const handleSaveRaw = () => {
        try {
          const segmenter = new Intl.Segmenter('zh-TW', { granularity: 'word' });
          const segments = Array.from(segmenter.segment(rawText));
          let newChunks = segments.map((seg, i) => ({ id: `raw-${Date.now()}-${i}-${Math.random().toString(36).substr(2, 9)}`, text: seg.segment, type: 'normal' }));
          newChunks = autoLink(newChunks, data.vocabList, data.coreGrammar, data.grammarRules);
          setData({ ...data, coreTextChunks: newChunks });
        } catch (e) {
          let newChunks = rawText.split(/([，。！？；：「」『』、\n])/).filter(Boolean).map((text, i) => ({ id: `raw-${Date.now()}-${i}-${Math.random().toString(36).substr(2, 9)}`, text, type: 'normal' }));
          newChunks = autoLink(newChunks, data.vocabList, data.coreGrammar, data.grammarRules);
          setData({ ...data, coreTextChunks: newChunks });
        }
        setIsEditingRaw(false);
      };
      
      const handleSaveChunk = () => {
        if (!editingChunk) return;
        let newChunks = (data.coreTextChunks || []).map(c => ({ ...c }));
        let newVocabList = [...(data.vocabList || [])]; 
        const idx = newChunks.findIndex(c => c.id === editingChunk.id);
        if (idx === -1) return;
        const oldText = newChunks[idx].text || '';

        if (isSplitting) {
          const parts = splitText.split(' ').filter(Boolean); 
          if (parts.length > 0) {
            const splitChunks = parts.map((part, i) => ({ id: `split-${Date.now()}-${i}-${Math.random().toString(36).substr(2, 9)}`, text: part, type: 'normal' }));
            const linked = autoLink(splitChunks, data.vocabList, data.coreGrammar, data.grammarRules);
            newChunks.splice(idx, 1, ...linked);
            setData({ ...data, coreTextChunks: newChunks });
            setEditingChunk(null); return;
          }
        }

        const newText = editingChunk.text || ''; const newType = editingChunk.type; 
        
        if (newText !== oldText && newText.startsWith(oldText)) {
          let toEat = newText.slice(oldText.length);
          let nextIdx = idx + 1;
          while (toEat.length > 0 && nextIdx < newChunks.length) {
            const nextC = newChunks[nextIdx];
            if (toEat.startsWith(nextC.text)) {
              toEat = toEat.slice(nextC.text.length);
              newChunks.splice(nextIdx, 1);
            } else break;
          }
        }
        
        newChunks[idx].text = newText;
        newChunks = newChunks.map(chunk => (chunk.text === newText ? { ...chunk, type: newType } : chunk));
        
        if (newType === 'keyword' || newType === 'vocab') {
           const existingIdx = newVocabList.findIndex(v => v.word === newText);
           if (existingIdx === -1) {
               newVocabList.push({ id: Date.now(), word: newText, pos: '名詞', type: newType });
           } else {
               newVocabList[existingIdx] = { ...newVocabList[existingIdx], type: newType };
           }
        }

        const finalChunks = autoLink(newChunks, newVocabList, data.coreGrammar, data.grammarRules);
        setData({ ...data, coreTextChunks: finalChunks, vocabList: newVocabList });
        setEditingChunk(null);
      };

      return (
        <div className="space-y-8">
          <div className="flex justify-between items-center"><h3 className="text-3xl font-black text-slate-700">核心課文編輯</h3><button onClick={() => isEditingRaw ? handleSaveRaw() : setIsEditingRaw(true)} className={`px-6 py-3 rounded-2xl font-black text-lg shadow-[0_4px_0_0_rgba(0,0,0,0.1)] active:translate-y-[4px] active:shadow-none transition-all ${isEditingRaw ? 'bg-[#FFAC59] text-white shadow-[0_4px_0_0_#E68A34]' : 'bg-[#FFFcf9] text-slate-600 shadow-[0_4px_0_0_#F0E5D8]'}`}>{isEditingRaw ? '儲存文本' : '修改整個文本 (純文字)'}</button></div>
          {!isEditingRaw && <div className="bg-[#FFFcf9] p-5 rounded-[24px] border border-orange-50 flex gap-4 items-center shadow-inner"><span className="font-bold text-slate-500">標記顏色：</span><div className="flex gap-3"><span className="px-4 py-1.5 bg-[#ffec99] rounded-xl font-bold text-yellow-900 shadow-sm">重點</span><span className="px-4 py-1.5 bg-[#d1f4df] rounded-xl font-bold text-[#1e6138] shadow-sm">生詞</span><span className="px-4 py-1.5 border-b-4 border-[#7A7387] bg-[#f1f5f9] rounded-t-xl font-bold text-slate-700 shadow-sm">語法</span></div></div>}
          <div className="p-8 bg-white border-2 border-orange-50 rounded-[32px] min-h-[300px] text-2xl leading-[2.5] shadow-[inset_0_4px_12px_rgba(0,0,0,0.02)]">
            {isEditingRaw ? <textarea className="w-full h-72 p-6 bg-[#FFFcf9] border-2 border-[#FFAC59] rounded-[24px] outline-none resize-none shadow-inner" value={rawText} onChange={(e) => setRawText(e.target.value)} /> : 
            <div className="text-2xl leading-[2.8] tracking-wider text-slate-800 font-bold">{(data.coreTextChunks || []).map((chunk) => {
              const textStr = (chunk.text || '').replace(/ /g, ''); const isPunc = chunk.type === 'punctuation' || /^[，。！？；：「」『』、\(\)（）\s"'.]+$/.test(textStr);
              if (isPunc) return <span key={chunk.id} className="text-slate-500 px-0 mx-0 inline leading-normal">{textStr}</span>;
              return <span key={chunk.id} onClick={() => { setEditingChunk({ ...chunk }); setIsSplitting(false); }} className={`cursor-pointer select-none inline box-decoration-clone transition-all hover:ring-4 hover:ring-orange-100 rounded-xl px-1 mx-[1px] ${chunk.type === 'keyword' ? 'bg-[#ffec99] shadow-sm' : chunk.type === 'vocab' ? 'bg-[#d1f4df] text-[#1e6138] shadow-sm' : chunk.type === 'grammar' ? 'border-b-4 border-[#7A7387] bg-[#f1f5f9] rounded-t-xl' : 'hover:bg-slate-100'}`}>{textStr}</span>;
            })}</div>}
          </div>
          {editingChunk && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/30 backdrop-blur-sm p-4 animate-in fade-in duration-200">
              <div className="bg-white rounded-[40px] p-10 max-w-sm w-full shadow-[0_24px_48px_rgba(0,0,0,0.2)] border-2 border-[#FFAC59] transform animate-in zoom-in-95 duration-200">
                <div className="flex justify-between items-center mb-8"><h4 className="text-2xl font-black text-slate-700">{isSplitting ? '拆分詞彙塊' : '編輯詞彙標記'}</h4><button onClick={() => setEditingChunk(null)} className="text-slate-400 hover:text-rose-500 bg-slate-100 p-2.5 rounded-full transition-colors"><X size={24} strokeWidth={3} /></button></div>
                <div className="space-y-6">
                  {!isSplitting ? (
                    <>
                      <div>
                        <div className="flex justify-between items-end mb-3"><label className="text-base font-bold text-slate-500 ml-1">詞彙內容</label><button onClick={() => { setIsSplitting(true); setSplitText(editingChunk.text || ''); }} className="text-sm font-bold text-[#FFAC59] bg-[#FFF9F2] hover:bg-[#FFE8CC] px-3 py-1.5 rounded-xl transition-colors">✂️ 拆分此詞塊</button></div>
                        <input type="text" value={editingChunk.text || ''} onChange={(e) => setEditingChunk({...editingChunk, text: e.target.value})} className="w-full px-5 py-4 bg-[#FFFcf9] border-2 border-orange-50 rounded-2xl text-2xl font-bold outline-none focus:border-[#FFAC59] shadow-inner" />
                      </div>
                      <div><label className="block text-base font-bold text-slate-500 mb-3 ml-1">標記等級分類</label><div className="grid grid-cols-2 gap-4">
                        <TypeButton type="keyword" label="重點詞彙" colorClass="bg-[#ffec99] text-yellow-900" borderClass="border-yellow-400" current={editingChunk.type} onClick={() => setEditingChunk({...editingChunk, type: 'keyword'})} />
                        <TypeButton type="vocab" label="一般詞彙" colorClass="bg-[#d1f4df] text-[#1e6138]" borderClass="border-[#48C0A3]" current={editingChunk.type} onClick={() => setEditingChunk({...editingChunk, type: 'vocab'})} />
                        <TypeButton type="grammar" label="語法標記" colorClass="bg-[#eef3ff] text-indigo-800" borderClass="border-indigo-400" current={editingChunk.type} onClick={() => setEditingChunk({...editingChunk, type: 'grammar'})} />
                        <TypeButton type="normal" label="無標記" colorClass="bg-[#f1f5f9] text-slate-600" borderClass="border-slate-300" current={editingChunk.type} onClick={() => setEditingChunk({...editingChunk, type: 'normal'})} />
                      </div></div>
                    </>
                  ) : (
                    <div className="animate-in fade-in duration-300">
                      <label className="block text-base font-bold text-slate-500 mb-3 ml-1">請以「空格」隔開要拆分的字詞</label>
                      <input autoFocus type="text" value={splitText} onChange={(e) => setSplitText(e.target.value)} className="w-full px-5 py-4 bg-[#FFFcf9] border-2 border-[#FFD5A6] rounded-2xl text-2xl font-bold outline-none focus:border-[#FFAC59] shadow-inner" placeholder="例如：日幣 貶值" />
                      <button onClick={() => setIsSplitting(false)} className="w-full py-4 mt-6 bg-slate-100 text-slate-600 rounded-2xl font-black text-lg shadow-[0_4px_0_0_#cbd5e1] hover:translate-y-[2px] hover:shadow-[0_2px_0_0_#cbd5e1] transition-all">取消拆分，返回編輯</button>
                    </div>
                  )}
                  <button onClick={handleSaveChunk} className={`w-full py-5 mt-4 text-white rounded-[24px] font-black text-2xl shadow-[0_6px_0_0_rgba(0,0,0,0.2)] transition-all active:translate-y-[6px] active:shadow-none ${isSplitting ? 'bg-[#56D0A0] shadow-[0_6px_0_0_#34A879]' : 'bg-[#FFAC59] shadow-[0_6px_0_0_#E68A34]'}`}>儲存變更</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function TypeButton({ type, current, onClick, label, colorClass, borderClass }) { 
      const isActive = type === current; 
      return <button onClick={onClick} className={`px-4 py-4 rounded-2xl border-[3px] font-bold text-base transition-all ${isActive ? `${colorClass} ${borderClass} shadow-md scale-105` : 'bg-white border-orange-50 text-slate-400 hover:bg-orange-50/50'}`}>{label}</button>; 
    }

    function VocabEditor({ data, setData, autoLink }) {
      const [isAddModalOpen, setIsAddModalOpen] = useState(false);
      const [editingItem, setEditingItem] = useState(null); 
      const [newVocab, setNewVocab] = useState({ word: '', pos: '名詞', type: 'vocab' });

      const handleSaveNew = () => {
        if (newVocab.word.trim()) {
          const newList = [...(data.vocabList || []), { ...newVocab, id: Date.now() }];
          const newChunks = autoLink(data.coreTextChunks, newList, data.coreGrammar, data.grammarRules);
          setData({ ...data, vocabList: newList, coreTextChunks: newChunks });
          setNewVocab({ word: '', pos: '名詞', type: 'vocab' });
          setIsAddModalOpen(false);
        }
      };

      const handleSaveEdit = () => {
        if (editingItem && editingItem.word.trim()) {
          const newList = data.vocabList.map(v => v.id === editingItem.id ? editingItem : v);
          const newChunks = autoLink(data.coreTextChunks, newList, data.coreGrammar, data.grammarRules);
          setData({ ...data, vocabList: newList, coreTextChunks: newChunks });
          setEditingItem(null);
        }
      };

      return (
        <div className="space-y-8">
          <div className="flex justify-between items-center"><h3 className="text-3xl font-black text-slate-700">核心詞彙卡編輯</h3><button onClick={() => setIsAddModalOpen(true)} className="px-6 py-3 bg-[#EAFBF4] text-[#1B6B47] border-2 border-[#56D0A0] rounded-2xl font-black text-lg flex items-center gap-2 shadow-[0_4px_0_0_#34A879] hover:translate-y-[2px] hover:shadow-[0_2px_0_0_#34A879] active:translate-y-[4px] active:shadow-none transition-all"><Plus size={22} strokeWidth={3}/> 新增詞彙</button></div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">{(data.vocabList || []).map((v, idx) => {
            const isKeyword = v.type === 'keyword';
            const cardBg = isKeyword ? 'bg-[#FFFBEA]' : 'bg-white';
            const cardBorder = isKeyword ? 'border-[#FFCD57]' : 'border-orange-50';
            const cardShadowHover = isKeyword ? 'hover:shadow-[0_4px_0_0_#DCA427]' : 'hover:shadow-[0_4px_0_0_#34A879]';
            const cardBorderHover = isKeyword ? 'hover:border-[#DCA427]' : 'hover:border-[#56D0A0]';
            const circleBg = isKeyword ? 'bg-[#FFCD57]' : 'bg-[#56D0A0]';
            const posBg = isKeyword ? 'bg-[#FFE8CC]' : 'bg-[#EAFBF4]';
            const posText = isKeyword ? 'text-[#B8860B]' : 'text-[#1B6B47]';

            return (
              <div key={v.id} 
                   onClick={() => setEditingItem({ ...v, type: v.type || 'vocab' })}
                   className={`p-6 ${cardBg} rounded-[24px] relative group cursor-pointer shadow-[0_6px_0_0_#F0E5D8] border-2 ${cardBorder} hover:translate-y-[2px] ${cardShadowHover} ${cardBorderHover} transition-all`}>
                <button onClick={(e) => {
                  e.stopPropagation();
                  const newList = data.vocabList.filter(item => item.id !== v.id);
                  const newChunks = autoLink(data.coreTextChunks, newList, data.coreGrammar, data.grammarRules);
                  setData({ ...data, vocabList: newList, coreTextChunks: newChunks });
                }} className="absolute top-6 right-6 text-slate-300 hover:text-rose-500 bg-white/50 p-2 rounded-full hover:bg-rose-50 transition-colors"><Trash2 size={20} strokeWidth={2.5}/></button>
                <div className="flex items-center gap-5 mb-1"><span className={`${circleBg} text-white w-12 h-12 rounded-full flex items-center justify-center font-black text-xl shadow-inner`}>{idx + 1}</span><div className="flex-1"><span className="font-black text-3xl text-slate-800">{v.word}</span><span className={`text-sm ${posBg} ${posText} px-4 py-1.5 rounded-full font-bold ml-4 uppercase`}>{v.pos}</span></div></div>
              </div>
            );
          })}</div>

          {isAddModalOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/30 backdrop-blur-sm p-4 animate-in fade-in duration-200">
              <div className="bg-white rounded-[40px] p-10 max-w-sm w-full shadow-[0_24px_48px_rgba(0,0,0,0.2)] border-2 border-[#56D0A0] animate-in zoom-in-95 duration-200">
                <h4 className="text-2xl font-black text-slate-700 mb-8 flex items-center gap-3"><Plus className="text-[#56D0A0]" size={32} strokeWidth={3}/>新增詞彙</h4>
                <div className="space-y-6">
                  <div><label className="block text-base font-bold text-slate-500 mb-2 ml-1">詞彙名稱</label><input autoFocus type="text" className="w-full px-5 py-4 bg-[#f8fafc] border-2 border-slate-100 rounded-2xl text-2xl font-bold outline-none focus:border-[#56D0A0] shadow-inner" value={newVocab.word} onChange={(e) => setNewVocab({...newVocab, word: e.target.value})} placeholder="例如：日幣" /></div>
                  <div><label className="block text-base font-bold text-slate-500 mb-2 ml-1">詞性</label><input type="text" className="w-full px-5 py-4 bg-[#f8fafc] border-2 border-slate-100 rounded-2xl outline-none focus:border-[#56D0A0] text-lg font-bold shadow-inner" value={newVocab.pos} onChange={(e) => setNewVocab({...newVocab, pos: e.target.value})} placeholder="例如：名詞" /></div>
                  <div>
                    <label className="block text-base font-bold text-slate-500 mb-3 ml-1">標記等級</label>
                    <div className="grid grid-cols-2 gap-4">
                      <TypeButton type="keyword" label="重點詞彙" colorClass="bg-[#ffec99] text-yellow-900" borderClass="border-yellow-400" current={newVocab.type} onClick={() => setNewVocab({...newVocab, type: 'keyword'})} />
                      <TypeButton type="vocab" label="一般詞彙" colorClass="bg-[#d1f4df] text-[#1e6138]" borderClass="border-[#48C0A3]" current={newVocab.type} onClick={() => setNewVocab({...newVocab, type: 'vocab'})} />
                    </div>
                  </div>
                  <div className="flex gap-4 pt-6"><button onClick={() => setIsAddModalOpen(false)} className="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-black text-lg shadow-[0_4px_0_0_#cbd5e1] active:translate-y-[4px] active:shadow-none transition-all">取消</button><button onClick={handleSaveNew} className="flex-1 py-4 bg-[#56D0A0] text-white rounded-2xl font-black text-lg shadow-[0_4px_0_0_#34A879] active:translate-y-[4px] active:shadow-none transition-all">儲存詞彙</button></div>
                </div>
              </div>
            </div>
          )}

          {editingItem && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/30 backdrop-blur-sm p-4 animate-in fade-in duration-200">
              <div className="bg-white rounded-[40px] p-10 max-w-sm w-full shadow-[0_24px_48px_rgba(0,0,0,0.2)] border-2 border-[#56D0A0] animate-in zoom-in-95 duration-200">
                <h4 className="text-2xl font-black text-slate-700 mb-8 flex items-center gap-3"><Edit3 className="text-[#56D0A0]" size={32} strokeWidth={3}/>編輯核心詞彙</h4>
                <div className="space-y-6">
                  <div><label className="block text-base font-bold text-slate-500 mb-2 ml-1">詞彙內容</label><input autoFocus type="text" className="w-full px-5 py-4 bg-[#f8fafc] border-2 border-slate-100 rounded-2xl text-2xl font-bold outline-none focus:border-[#56D0A0] shadow-inner" value={editingItem.word} onChange={(e) => setEditingItem({...editingItem, word: e.target.value})} /></div>
                  <div><label className="block text-base font-bold text-slate-500 mb-2 ml-1">詞性 (可由老師修正)</label><input type="text" className="w-full px-5 py-4 bg-[#f8fafc] border-2 border-slate-100 rounded-2xl outline-none focus:border-[#56D0A0] text-lg font-bold shadow-inner" value={editingItem.pos} onChange={(e) => setEditingItem({...editingItem, pos: e.target.value})} placeholder="例如：noun" /></div>
                  <div>
                    <label className="block text-base font-bold text-slate-500 mb-3 ml-1">標記等級</label>
                    <div className="grid grid-cols-2 gap-4">
                      <TypeButton type="keyword" label="重點詞彙" colorClass="bg-[#ffec99] text-yellow-900" borderClass="border-yellow-400" current={editingItem.type} onClick={() => setEditingItem({...editingItem, type: 'keyword'})} />
                      <TypeButton type="vocab" label="一般詞彙" colorClass="bg-[#d1f4df] text-[#1e6138]" borderClass="border-[#48C0A3]" current={editingItem.type} onClick={() => setEditingItem({...editingItem, type: 'vocab'})} />
                    </div>
                  </div>
                  <div className="flex gap-4 pt-6"><button onClick={() => setEditingItem(null)} className="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-black text-lg shadow-[0_4px_0_0_#cbd5e1] active:translate-y-[4px] active:shadow-none transition-all">取消</button><button onClick={handleSaveEdit} className="flex-1 py-4 bg-[#56D0A0] text-white rounded-2xl font-black text-lg shadow-[0_4px_0_0_#34A879] active:translate-y-[4px] active:shadow-none transition-all">儲存修改</button></div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function DialogueEditor({ data, setData }) {
      const updateLine = (sid, lid, f, v) => { setData({ ...data, dialogues: data.dialogues.map(d => d.id === sid ? { ...d, lines: d.lines.map(l => l.id === lid ? { ...l, [f]: v } : l) } : d) }); };
      return (
        <div className="space-y-10">
          <div className="flex justify-between items-center"><h3 className="text-3xl font-black text-slate-700">情境對話編輯</h3><button onClick={() => setData({ ...data, dialogues: [...(data.dialogues || []), { id: Date.now(), title: '情境', lines: [] }] })} className="px-6 py-3 bg-[#F4F0FF] text-[#4A3285] border-2 border-[#A084E8] rounded-2xl font-black text-lg flex items-center gap-2 shadow-[0_4px_0_0_#7D5EC4] hover:translate-y-[2px] hover:shadow-[0_2px_0_0_#7D5EC4] active:translate-y-[4px] active:shadow-none transition-all"><Plus size={22} strokeWidth={3}/> 新增情境</button></div>
          {(data.dialogues || []).map((s) => (
            <div key={s.id} className="bg-white border-2 border-orange-50 shadow-[0_8px_0_0_#F0E5D8] rounded-[32px] p-8 relative">
              <button onClick={() => setData({ ...data, dialogues: data.dialogues.filter(d => d.id !== s.id) })} className="absolute top-8 right-8 text-slate-300 hover:text-rose-500 bg-orange-50/50 p-2 rounded-full hover:bg-rose-50"><Trash2 size={22} strokeWidth={2.5}/></button>
              <input className="text-2xl font-black text-[#4A3285] bg-[#F4F0FF] border-2 border-[#D8C7FF] px-6 py-3 rounded-2xl mb-8 outline-none focus:border-[#A084E8] w-full md:w-auto shadow-inner" value={s.title || ''} onChange={(e) => setData({ ...data, dialogues: data.dialogues.map(d => d.id === s.id ? { ...d, title: e.target.value } : d) })} placeholder="輸入情境標題" />
              <div className="space-y-4">{(s.lines || []).map((l) => (
                <div key={l.id} className="flex gap-4 items-start group"><input className="w-16 text-center font-black text-xl bg-[#f8fafc] border-2 border-slate-100 rounded-2xl py-4 outline-none focus:border-[#A084E8] shadow-inner" value={l.speaker || ''} onChange={(e) => updateLine(s.id, l.id, 'speaker', e.target.value)} /><textarea className="w-full bg-[#f8fafc] border-2 border-slate-100 rounded-2xl px-6 py-4 outline-none focus:border-[#A084E8] text-xl font-bold resize-none h-[64px] leading-relaxed shadow-inner" value={l.text || ''} onChange={(e) => updateLine(s.id, l.id, 'text', e.target.value)} placeholder="對話文字..." /><button onClick={() => setData({ ...data, dialogues: data.dialogues.map(d => d.id === s.id ? { ...d, lines: d.lines.filter(li => li.id !== l.id) } : d) })} className="text-slate-300 hover:text-rose-500 p-3 rounded-full hover:bg-rose-50 transition-colors mt-1"><Trash2 size={20} strokeWidth={2.5}/></button></div>
              ))}</div>
              <button onClick={() => setData({ ...data, dialogues: data.dialogues.map(d => d.id === s.id ? { ...d, lines: [...d.lines, { id: Date.now(), speaker: 'A', text: '' }] } : d) })} className="mt-8 text-[#A084E8] font-black text-lg flex items-center gap-2 hover:bg-[#F4F0FF] px-5 py-3 rounded-2xl transition-colors border-2 border-dashed border-[#D8C7FF]"><Plus size={20} strokeWidth={3}/> 新增句子</button>
            </div>
          ))}
        </div>
      );
    }

    function GrammarPointEditor({ data, setData, autoLink }) {
      const updatePoint = (id, field, value) => {
        const newGrammar = (data.coreGrammar || []).map(p => p.id === id ? { ...p, [field]: value } : p);
        let newData = { ...data, coreGrammar: newGrammar };
        if (field === 'title') newData.coreTextChunks = autoLink(newData.coreTextChunks, newData.vocabList, newGrammar, newData.grammarRules);
        setData(newData);
      };

    function ZhuyinBlock({ syllable }) {
      if (!syllable) return null;
      const cleanSyllable = syllable.replace(/\s+/g, '');
      const chars = cleanSyllable.split('');
      const tones = ['ˊ', 'ˇ', 'ˋ', '˙'];
      const baseChars = chars.filter(c => !tones.includes(c));
      const toneChar = chars.find(c => tones.includes(c));
      
      const isTriple = baseChars.length === 3;
      const isDouble = baseChars.length === 2;
      const isSingle = baseChars.length === 1;
      
      const colClass = `zy-col ${isTriple ? 'is-triple' : isDouble ? 'is-double' : 'is-single'}`;
      
      return (
          <span className="zy-wrapper">
              {toneChar === '˙' && <span className="tone-top">{toneChar}</span>}
              <span className={colClass}>
                  {baseChars.map((z, zi) => <span className="z-char" key={zi}>{z}</span>)}
              </span>
              {toneChar && toneChar !== '˙' && <span className="tone-side">{toneChar}</span>}
          </span>
      );

      const rawPyTokens = filterPhoneticTokens(pinyinStr);
      const rawZyTokens = filterPhoneticTokens(zhuyinStr);

      let zyIdx = 0;

        >
          {hanziChars.map((char, index) => {
            const isHz = isHanzi(char);
            let py = '';
            let zy = '';
            if (isHz) {
              py = rawPyTokens[pyIdx] || '';
              zy = rawZyTokens[zyIdx] || '';
              pyIdx++;
              zyIdx++;
            }

            const charHighlightStyle = hasHighlight ? {
               borderBottom: highlightStyle.borderBottom,
               color: highlightStyle.color,
               fontWeight: highlightStyle.fontWeight,
               paddingBottom: '0px'
            } : {};

          if (!isHz) {
              // 黃金比例 2.1：保持標點符號原尺寸，左側推開 5% 建立聲調防護區，右側強壓 45% 消除多餘留白
              const isPunc = /^[。，、！？；：”’）\]]$/.test(char);
              return (
                <span key={index} className="punc-text" style={isPunc ? { marginLeft: '0.02em', marginRight: '-0.30em' } : {}}>
                  {/* 保留原本的 \u2060 防斷行字元，利用右側負邊距達到緊湊效果，同時保護注音聲調 */}
                  {'\u2060'}{char}
                </span>
              );
            }

            const isLastChar = index === hanziChars.length - 1;
            const showTag = isLastChar && vocabNumber;

            return (
              <span key={index} className="hz-wrapper">
                <span className="char-unit" style={{ ...charHighlightStyle, position: 'relative' }}>
                  <span className="hz-font">{char}</span>
                  {showZ && zy && <ZhuyinBlock syllable={zy} />}
                  
                 {/* 方案 D：空心編號標籤 (瘦身微調版) */}
                  {showTag && wordType === 'keyword' && (
                    <div style={{ position: 'absolute', top: '-0.4em', right: '-0.35em', width: '1em', height: '1em', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 10 }}>
                      <svg width="100%" height="100%" viewBox="0 0 24 24" fill="white" stroke="#FFB020" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round" style={{position: 'absolute'}}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                      <span style={{ fontSize: '0.5em', fontWeight: '900', color: '#FFB020', zIndex: 1, marginTop: '1px', fontFamily: 'Arial, sans-serif' }}>{vocabNumber}</span>
                    </div>
                  )}
                  {showTag && wordType === 'vocab' && (
                    <div style={{ position: 'absolute', top: '-0.35em', right: '-0.3em', width: '0.9em', height: '0.9em', borderRadius: '50%', border: '1px solid #56D0A0', display: 'flex', alignItems: 'center', justifyContent: 'center', backgroundColor: 'white', zIndex: 10 }}>
                      <span style={{ fontSize: '0.55em', fontWeight: '900', color: '#56D0A0', fontFamily: 'Arial, sans-serif' }}>{vocabNumber}</span>
                    </div>
                  )}
                  {showTag && wordType === 'vocab' && (
                    <div style={{ position: 'absolute', top: '-0.25em', right: '-0.25em', width: '1em', height: '1em', borderRadius: '50%', border: '1.5px solid #56D0A0', display: 'flex', alignItems: 'center', justifyContent: 'center', backgroundColor: 'white', zIndex: 10 }}>
                      <span style={{ fontSize: '0.6em', fontWeight: '900', color: '#56D0A0', fontFamily: 'Arial, sans-serif' }}>{vocabNumber}</span>
                    </div>
                  )}

                </span>
                {showP && <span className="res-py">{py || '\u00A0'}</span>}
              </span>
            );
          })}
        </span>
      );
    }

    function InlineRubyText({ text, settings, vocabList, coreTextChunks, coreGrammar, grammarRules, sentencePinyin, sentenceZhuyin, isCorrection = false, alwaysShowRuby = false, sentenceEditPayload = null }) {
      const onEdit = React.useContext(EditPhoneticContext);
      if (!text) return null;

      const isTypePinyin = settings.phoneticType === 'pinyin' || settings.phoneticType === 'zhuyin_pinyin';
      const isTypeZhuyin = settings.phoneticType === 'zhuyin' || settings.phoneticType === 'zhuyin_pinyin';
      const effectiveScope = alwaysShowRuby ? 'full_text' : settings.phoneticScope;

      const isHanzi = (char) => /[\u4e00-\u9fa5]/.test(char);

      let targetWords = (vocabList || []).filter(v => v.word).map(v => v.word);
      if (coreGrammar) targetWords.push(...coreGrammar.filter(g => g.title).map(g => g.title));
      if (grammarRules) targetWords.push(...grammarRules.filter(r => r.theme).map(r => r.theme));
      
      targetWords = [...new Set(targetWords)];
      targetWords.sort((a, b) => b.length - a.length);

      if (effectiveScope !== 'full_text' && targetWords.length === 0) {
         return (
           <span className={`${isCorrection ? 'text-[#1B4D3E]' : 'text-slate-900'} relative group`} style={{ display: 'inline' }}>
             <WordBlock text={text} pinyinStr="" zhuyinStr="" showP={false} showZ={false} highlightStyle={{}} />
             {sentenceEditPayload && onEdit && (
                 <button onClick={(e) => { e.stopPropagation(); onEdit(sentenceEditPayload); }} className="ml-2 opacity-0 group-hover:opacity-100 text-[#FF9B82] transition-opacity print:hidden inline-flex align-middle pb-2" title="編輯整句標音">
                    <Edit3 size={18} strokeWidth={3} />
                 </button>
             )}
           </span>
         );
      }

      const getWordType = (word) => {
        if (coreGrammar && coreGrammar.some(g => g.title === word)) return 'grammar';
        if (grammarRules && grammarRules.some(r => r.theme === word)) return 'grammar';
        if (vocabList) {
          const v = vocabList.find(v => v.word === word);
          if (v && v.type) return v.type;
        }
        if (coreTextChunks) {
          const chunk = coreTextChunks.find(c => c.text === word && c.type !== 'normal' && c.type !== 'punctuation');
          if (chunk) return chunk.type;
        }
        return 'vocab';
      };

      const escapedWords = targetWords.map(w => w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
      const regex = targetWords.length > 0 ? new RegExp(`(${escapedWords.join('|')})`, 'g') : /(?!)/g;
      const parts = text.split(regex);

      const fullPyTokens = filterPhoneticTokens(sentencePinyin);
      const fullZyTokens = filterPhoneticTokens(sentenceZhuyin);
      
      let pyCursor = 0;
      let zyCursor = 0;

      const content = parts.map((part, i) => {
        if (!part) return null;
        let hanziCount = 0;
        for(const char of part) { if(isHanzi(char)) hanziCount++; }

        const partPyTokens = fullPyTokens.slice(pyCursor, pyCursor + hanziCount);
        const partZyTokens = fullZyTokens.slice(zyCursor, zyCursor + hanziCount);
        pyCursor += hanziCount;
        zyCursor += hanziCount;

        const matchedVocab = (vocabList || []).find(v => v.word === part);
        const matchedGrammar = (coreGrammar || []).find(g => g.title === part) || (grammarRules || []).find(r => r.theme === part);
        
        let pyForBlock = '';
        let zyForBlock = '';
        let showP = false;
        let showZ = false;
        let highlightStyle = {};
        let editPayload = null;

       if (matchedVocab || matchedGrammar) {
              showP = isTypePinyin;
              showZ = isTypeZhuyin;

              if (matchedVocab) {
                const isException = part === '一' || part === '不';
                if (!isException && matchedVocab.pinyin) {
                  // 最高權重：直接強制使用核心詞彙的拼音 (不受整句編輯干擾)
                  pyForBlock = matchedVocab.pinyin;
                  zyForBlock = matchedVocab.zhuyin || partZyTokens.join(' ');
                } else {
                  // 一般權重：有整句編輯優先，沒有才用詞彙的
                  pyForBlock = effectiveScope === 'full_text' ? (partPyTokens.join(' ') || matchedVocab.pinyin) : matchedVocab.pinyin;
                  zyForBlock = effectiveScope === 'full_text' ? (partZyTokens.join(' ') || matchedVocab.zhuyin) : matchedVocab.zhuyin;
                }
                editPayload = { type: 'vocab', id: matchedVocab.id, text: part, pinyin: matchedVocab.pinyin || '', zhuyin: matchedVocab.zhuyin || '' };
              } else {
                pyForBlock = partPyTokens.join(' ');
                zyForBlock = partZyTokens.join(' ');
                editPayload = null;
              }
          
          const wType = getWordType(part);
          if (wType === 'keyword') {
              highlightStyle = { borderBottom: '4px solid #FFCD57', color: '#B8860B', fontWeight: 'bold', WebkitPrintColorAdjust: 'exact' };
          } else if (wType === 'grammar') {
              highlightStyle = { borderBottom: '4px dashed #7A7387', color: '#5C5666', fontWeight: 'bold', WebkitPrintColorAdjust: 'exact' };
          } else {
              highlightStyle = { borderBottom: '4px solid #56D0A0', color: '#1B6B47', fontWeight: 'bold', WebkitPrintColorAdjust: 'exact' };
          }
        } else {
          if (effectiveScope === 'full_text') {
            showP = isTypePinyin;
            showZ = isTypeZhuyin;
            pyForBlock = partPyTokens.join(' ');
            zyForBlock = partZyTokens.join(' ');
          }
        }

       // 判斷是否為標點符號，給予向左靠攏的負邊距磁力
            const isPunc = /^[。，、！？；：”’）\]]+$/.test(part);
            const block = <WordBlock key={i} text={part} pinyinStr={pyForBlock} zhuyinStr={zyForBlock} showP={showP} showZ={showZ} highlightStyle={highlightStyle} editPayload={editPayload} />;
            return isPunc ? <span key={i} className="-ml-1.5 inline-block">{block}</span> : block;
      });

      return (
        <span className={`${isCorrection ? 'text-[#1B4D3E]' : 'text-slate-900'} relative group`} style={{ display: 'inline' }}>
          {content}
          {sentenceEditPayload && onEdit && (
             <button onClick={(e) => { e.stopPropagation(); onEdit(sentenceEditPayload); }} className="ml-2 opacity-0 group-hover:opacity-100 text-[#FF9B82] transition-opacity print:hidden inline-flex align-middle pb-2" title="編輯整句標音">
                <Edit3 size={18} strokeWidth={3} />
             </button>
          )}
        </span>
      );
    }

    function RenderMistakePDF({ rule, text, settings, vocabList, coreTextChunks, coreGrammar, grammarRules }) {
      const onEdit = React.useContext(EditPhoneticContext);
      if (!text) return null;
      const parts = text.split(/(<u>.*?<\/u>)/g);
      
      const cleanText = text.replace(/<\/?u>/g, '');
      const editPayload = { type: 'rule_mistake', id: rule.id, text: cleanText, pinyin: rule.mistakePinyin || '', zhuyin: rule.mistakeZhuyin || '' };

      const fullPyTokens = filterPhoneticTokens((rule.mistakePinyin || '').replace(/<\/?u>/g, ''));
      const fullZyTokens = filterPhoneticTokens((rule.mistakeZhuyin || '').replace(/<\/?u>/g, ''));
      
      let pyCursor = 0;
      let zyCursor = 0;

      return (
        <div className="sentence-block flex-1 min-w-0 relative group" style={{ display: 'inline' }}>
          {parts.map((part, i) => {
            const isUnderlined = part.startsWith('<u>') && part.endsWith('</u>');
            const innerText = isUnderlined ? part.slice(3, -4) : part;

            let hanziCount = 0;
            for(const char of innerText) { if(/[\u4e00-\u9fa5]/.test(char)) hanziCount++; }

            const partPy = fullPyTokens.slice(pyCursor, pyCursor + hanziCount).join(' ');
            const partZy = fullZyTokens.slice(zyCursor, zyCursor + hanziCount).join(' ');
            
            pyCursor += hanziCount;
            zyCursor += hanziCount;

            const renderSpan = (
                <InlineRubyText text={innerText} settings={settings} vocabList={vocabList} coreTextChunks={coreTextChunks} coreGrammar={coreGrammar} grammarRules={grammarRules} sentencePinyin={partPy} sentenceZhuyin={partZy} />
            );

            return isUnderlined ? (
                <span key={i} style={{ backgroundColor: '#fecdd3', padding: '2px 4px', borderRadius: '6px', WebkitPrintColorAdjust: 'exact', printColorAdjust: 'exact', display: 'inline' }}>
                   {renderSpan}
                </span>
            ) : <React.Fragment key={i}>{renderSpan}</React.Fragment>;
          })}
          {onEdit && (
             <button onClick={(e) => { e.stopPropagation(); onEdit(editPayload); }} className="ml-2 opacity-0 group-hover:opacity-100 text-[#FF9B82] transition-opacity print:hidden inline-flex align-middle pb-2" title="編輯整句標音">
                <Edit3 size={18} strokeWidth={3} />
             </button>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
